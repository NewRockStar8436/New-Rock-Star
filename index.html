<!DOCTYPE html>

<head>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      text-align: center;

    .section h2 {

    }
    .gallery img {

      border-radius: 12px;
      object-fit: cover;

    .contact {
